services:
  cpp-exam:
    build:
      context: https://github.com/admin05/cpp-exam-generator.git#main
      dockerfile: Dockerfile
    image: cpp-exam-generator:github
    container_name: cpp-exam-generator
    restart: unless-stopped
    ports:
      - "8088:8000"
    environment:
      EXAM_DB: /data/exam.db
      HOST: 0.0.0.0
      PORT: 8000
    volumes:
      - cpp_exam_data:/data
    tmpfs:
      - /judge:size=256m,exec
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    mem_limit: 512m

volumes:
  cpp_exam_data:
