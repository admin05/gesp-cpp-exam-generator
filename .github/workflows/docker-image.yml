name: Build Docker image

on:
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - online_exam/**
      - docker-compose*.yml
      - .github/workflows/docker-image.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/admin05/cpp-exam-generator:latest
            ghcr.io/admin05/cpp-exam-generator:${{ github.sha }}
